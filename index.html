<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HugTheBox</title>
  <link rel="icon" type="image/png" href="favicon/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png" />
  <link rel="manifest" href="favicon/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2333;
      --border:    rgba(159,239,0,0.1);
      --border2:   rgba(159,239,0,0.06);
      --green:     #9fef00;
      --green-d:   #7bc800;
      --green-glow:rgba(159,239,0,0.18);
      --green-dim: rgba(159,239,0,0.5);
      --text:      #8b949e;
      --white:     #e6edf3;
      --red:       #f85149;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(159,239,0,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(159,239,0,.018) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* Ambient glow */
    .ambient {
      position: fixed; z-index: 0; pointer-events: none;
      border-radius: 50%;
      filter: blur(100px);
      animation: drift 20s ease-in-out infinite alternate;
    }
    .amb-1 { width: 700px; height: 700px; top: -200px; left: -150px; background: rgba(159,239,0,.055); animation-delay: 0s; }
    .amb-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: rgba(159,239,0,.04); animation-delay: -8s; }
    .amb-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(159,239,0,.03); animation-delay: -14s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }
    .amb-3 { animation: drift3 18s ease-in-out infinite alternate; }
    @keyframes drift3 {
      from { transform: translate(-50%,-50%) scale(1); }
      to   { transform: translate(calc(-50% + 20px), calc(-50% + 15px)) scale(1.1); }
    }

    /* Particle canvas */
    canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* Scan line */
    .scan {
      position: fixed; left: 0; right: 0; height: 1px; z-index: 2; pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, var(--green) 50%, transparent 100%);
      opacity: .07;
      animation: scan 12s linear infinite;
    }
    @keyframes scan { from { top: -1px; } to { top: 100vh; } }

    /* Corner brackets */
    .corner { position: fixed; z-index: 10; pointer-events: none; opacity: .45; }
    .tl { top: 20px; left: 20px; }
    .tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .br { bottom: 20px; right: 20px; transform: scale(-1,-1); }

    /* ── MAIN LAYOUT ── */
    .stage {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      text-align: center;
      padding: 0 24px;
      max-width: 660px;
      width: 100%;
    }

    /* ── LOGO ── */
    .logo-block {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      margin-bottom: 32px;
      animation: up 1s .05s cubic-bezier(.16,1,.3,1) both;
    }

    .logo-ring {
      position: relative; width: 82px; height: 82px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: -10px; border-radius: 50%;
      border: 1px solid rgba(159,239,0,.2);
      animation: ring-pulse 3s ease-in-out infinite;
    }
    .logo-ring::after {
      content: '';
      position: absolute; inset: -22px; border-radius: 50%;
      border: 1px solid rgba(159,239,0,.07);
      animation: ring-pulse 3s 0.4s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(1.04); }
    }

    .logo-ring img {
      width: 82px; height: 82px;
      border-radius: 18px;
      position: relative; z-index: 1;
      filter: drop-shadow(0 0 16px rgba(159,239,0,.4));
    }

    .logo-text {
      font-size: clamp(40px, 7.5vw, 80px);
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1;
    }
    .logo-hug    { color: var(--green); text-shadow: 0 0 40px rgba(159,239,0,.3); }
    .logo-thebox { color: var(--white); }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--green-dim);
      background: rgba(159,239,0,.04);
      margin-bottom: 36px;
      animation: up 1s .15s cubic-bezier(.16,1,.3,1) both;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); animation: blink 2.2s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }

    /* ── TERMINAL CARD ── */
    .term {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 28px;
      animation: up 1s .25s cubic-bezier(.16,1,.3,1) both;
    }
    .term-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
    }
    .tb { width: 10px; height: 10px; border-radius: 50%; }
    .tb:nth-child(1){background:#ff5f57} .tb:nth-child(2){background:#febc2e} .tb:nth-child(3){background:#28c840}
    .term-title { font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(139,148,158,.35); margin-left:auto; letter-spacing:.06em; }
    .term-body { padding: 16px 20px; text-align: left; display: flex; flex-direction: column; gap: 6px; }
    .trow { display: flex; align-items: baseline; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .pr  { color: var(--green); flex-shrink: 0; user-select: none; }
    .tv  { color: var(--white); }
    .tc  { color: rgba(139,148,158,.35); }
    .tk  { color: #79c0ff; }
    .cursor-b {
      display: inline-block; width: 7px; height: 13px;
      background: var(--green); vertical-align: middle; margin-left: 2px;
      animation: cur 1.1s step-end infinite;
    }
    @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── PROGRESS ── */
    .prog {
      margin-bottom: 28px;
      animation: up 1s .35s cubic-bezier(.16,1,.3,1) both;
    }
    .prog-head {
      display: flex; justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(139,148,158,.4);
      margin-bottom: 8px;
    }
    .prog-head span:last-child { color: var(--green); }
    .prog-track { height: 2px; background: rgba(255,255,255,.05); border-radius: 99px; overflow: hidden; }
    .prog-fill {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--green-d), var(--green), #b8ff30);
      border-radius: 99px;
      box-shadow: 0 0 8px rgba(159,239,0,.6);
      animation: fill 2.5s 1s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes fill { to { width: 37%; } }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 28px;
      animation: up 1s .5s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── NOTIFY ── */
    .notify {
      animation: up 1s .55s cubic-bezier(.16,1,.3,1) both;
    }
    .notify-lbl {
      font-size: 10.5px; letter-spacing: .09em; text-transform: uppercase;
      color: rgba(139,148,158,.4);
      margin-bottom: 10px;
    }
    .notify-row { display: flex; max-width: 380px; margin: 0 auto; }
    .notify-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 5px 0 0 5px;
      padding: 11px 14px;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      outline: none;
      transition: border-color .2s;
    }
    .notify-row input::placeholder { color: rgba(139,148,158,.28); }
    .notify-row input:focus { border-color: rgba(159,239,0,.3); }
    .notify-row input.e { border-color: rgba(248,81,73,.5); }
    .notify-row button {
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: 0 5px 5px 0;
      padding: 11px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      transition: background .2s, opacity .2s, transform .1s;
    }
    .notify-row button:hover:not(:disabled) { background: #b8ff30; }
    .notify-row button:active:not(:disabled) { transform: scale(.97); }
    .notify-row button:disabled { opacity: .4; cursor: not-allowed; }

    .fb {
      margin-top: 10px; min-height: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: .06em;
    }
    .fb.ok  { color: var(--green); }
    .fb.bad { color: var(--red); }

    /* ── FOOTER ── */
    .footer {
      position: fixed; bottom: 20px; left: 0; right: 0; z-index: 10;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(139,148,158,.15);
    }

    /* ── ANIM ── */
    @keyframes up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .notify-row { flex-direction: column; }
      .notify-row input { border-right: 1px solid var(--border); border-bottom: none; border-radius: 5px 5px 0 0; }
      .notify-row button { border-radius: 0 0 5px 5px; padding: 12px; }
    }
  </style>
</head>
<body>

  <div class="grid-overlay"></div>
  <div class="ambient amb-1"></div>
  <div class="ambient amb-2"></div>
  <div class="ambient amb-3"></div>
  <div class="scan"></div>
  <canvas id="c"></canvas>

  <div class="corner tl"><svg width="32" height="32" fill="none"><path d="M0 32V0h32" stroke="#9fef00" stroke-width="1.2"/></svg></div>
  <div class="corner tr"><svg width="32" height="32" fill="none"><path d="M0 32V0h32" stroke="#9fef00" stroke-width="1.2"/></svg></div>
  <div class="corner bl"><svg width="32" height="32" fill="none"><path d="M0 32V0h32" stroke="#9fef00" stroke-width="1.2"/></svg></div>
  <div class="corner br"><svg width="32" height="32" fill="none"><path d="M0 32V0h32" stroke="#9fef00" stroke-width="1.2"/></svg></div>

  <div class="stage">
    <div class="card">

      

      <div class="badge">
        <span class="dot"></span>
        Platform under construction
      </div>

      <div class="term">
        <div class="term-bar">
          <div class="tb"></div><div class="tb"></div><div class="tb"></div>
          <span class="term-title">hugthebox — zsh</span>
        </div>
        <div class="term-body">
          <div class="trow">
            <span class="pr">$</span>
            <span><span class="tv">git status</span> <span class="tc"># hugthebox/core</span></span>
          </div>
          <div class="trow">
            <span class="pr">›</span>
            <span class="tc">On branch <span class="tv">main</span> &nbsp;·&nbsp; <span class="tv">37%</span> complete &nbsp;·&nbsp; launching soon</span>
          </div>
          <div class="trow">
            <span class="pr">$</span>
            <span class="tc">stack: <span class="tk">ctf</span> · <span class="tk">red team</span> · <span class="tk">appsec</span></span>
          </div>
          <div class="trow">
            <span class="pr">$</span>
            <span class="tv">_<span class="cursor-b"></span></span>
          </div>
        </div>
      </div>

      <div class="prog">
        <div class="prog-head">
          <span>Build Progress</span>
          <span id="pct">0%</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill"></div>
        </div>
      </div>


      <div class="divider"></div>

      <div class="notify">
        <div class="notify-lbl">Get notified on launch</div>
        <div class="notify-row" id="formRow">
          <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="off" />
          <button id="btn" onclick="submit()">Notify me</button>
        </div>
        <div class="fb" id="fb"></div>
      </div>

    </div>
  </div>

  <div class="footer">hugthebox.github.io &nbsp;·&nbsp; © 2026 &nbsp;·&nbsp; something is coming</div>

  <script>
    /* Particles */
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, pts = [];

    const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
    resize();
    addEventListener('resize', () => { resize(); spawn(); });

    const rand = (a, b) => a + Math.random() * (b - a);

    const spawn = () => {
      pts = [];
      const n = Math.floor((W * H) / 25000);
      for (let i = 0; i < n; i++)
        pts.push({ x: rand(0,W), y: rand(0,H), vx: rand(-.12,.12), vy: rand(-.22,-.04), r: rand(.5,1.5), a: rand(.08,.38) });
    };
    spawn();

    (function frame() {
      ctx.clearRect(0,0,W,H);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -4) { p.y = H+4; p.x = rand(0,W); }
        if (p.x < -4) p.x = W+4;
        if (p.x > W+4) p.x = -4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(159,239,0,${p.a})`;
        ctx.fill();
      });
      requestAnimationFrame(frame);
    })();

    /* Progress counter */
    let cur = 0;
    const pct = document.getElementById('pct');
    setTimeout(() => {
      const iv = setInterval(() => {
        if (cur >= 37) return clearInterval(iv);
        pct.textContent = (++cur) + '%';
      }, 2400 / 37);
    }, 1000);

    /* Notify */
    async function submit() {
      const input = document.getElementById('emailInput');
      const btn   = document.getElementById('btn');
      const fb    = document.getElementById('fb');
      const v     = input.value.trim();

      input.classList.remove('e');
      fb.className = 'fb';
      fb.textContent = '';

      if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
        input.classList.add('e');
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = '···';

      try {
        const r = await fetch('https://formspree.io/f/mzzpqayb', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email: v })
        });
        if (!r.ok) throw new Error();
        document.getElementById('formRow').style.display = 'none';
        fb.className = 'fb ok';
        fb.textContent = '✓  you\'re on the list — stay sharp.';
      } catch {
        btn.disabled = false;
        btn.textContent = 'Notify me';
        fb.className = 'fb bad';
        fb.textContent = '✗  something went wrong, try again.';
        setTimeout(() => { fb.textContent = ''; fb.className = 'fb'; }, 4000);
      }
    }

    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });

    /* Subtle logo glitch */
    const logo = document.querySelector('.logo-text');
    setInterval(() => {
      logo.style.transform = `translate(${rand(-1,1)}px,${rand(-.4,.4)}px)`;
      setTimeout(() => logo.style.transform = '', 70);
    }, rand(4000, 7000));
  </script>
</body>
</html>
